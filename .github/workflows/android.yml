name: Android APK

# Builds a debug-signed SoulOS APK with cargo-apk and uploads it as a
# workflow artifact. On tag pushes (`v*`) it also attaches the APK to a
# GitHub Release. The APK is unsigned for production purposes — fine for
# `adb install` while the project is still pre-1.0, not fine for the
# Play Store.
#
# On pull requests the build only runs when the "build apk" label is present,
# to avoid spending CI time on every change. Add the label to trigger a build.
#
# For upgradeable APKs, store a stable base64-encoded keystore in the
# ANDROID_DEBUG_KEYSTORE_B64 repository secret (see README for instructions).
# Without it a throwaway key is generated each run and Android will reject
# upgrades from a previously installed APK.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    paths:
      - "crates/soul-hal-android/**"
      - "crates/soul-runner-android/**"
      - "crates/soul-runner/**"
      - "crates/soul-core/**"
      - "crates/soul-ui/**"
      - "crates/soul-db/**"
      - "crates/soul-script/**"
      - "crates/soul-hal/**"
      - "assets/**"
      - "Cargo.toml"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # On PRs, only build when the "build apk" label has been applied.
    # Push and manual triggers always build.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'build apk')
    env:
      # GitHub-hosted Ubuntu images ship the Android SDK + NDK at this path
      # (see https://github.com/actions/runner-images). cargo-apk wants
      # ANDROID_NDK_HOME for the toolchain and ANDROID_HOME for d8/aapt.
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Install required Android SDK platform + build-tools
        # cargo-apk demands the exact `platforms;android-N` matching
        # `target_sdk_version` in Cargo.toml. The set preinstalled on
        # ubuntu-latest rotates, so we install ours explicitly rather than
        # hope it's already there.
        run: |
          set -eux
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager" --licenses >/dev/null
          "$sdkmanager" "platforms;android-33" "build-tools;33.0.2"

      - name: Resolve NDK path
        run: |
          ndk_root="$(ls -d "$ANDROID_HOME/ndk"/* | sort -V | tail -n1)"
          echo "ANDROID_NDK_HOME=$ndk_root" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_root" >> "$GITHUB_ENV"
          echo "Using NDK at $ndk_root"

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: android-apk
          workspaces: . -> target

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      - name: Restore or generate debug keystore
        # cargo-apk's release profile demands an explicit keystore. We're
        # not signing for the Play Store yet, so we use the stable debug
        # keystore stored in the ANDROID_DEBUG_KEYSTORE_B64 secret (base64-
        # encoded). A stable key lets users install updates without
        # uninstalling first. Without the secret, a throwaway key is
        # generated — installs from that build cannot be upgraded.
        # cargo-apk doesn't shell-expand `~`, so the keystore lives at
        # the repo root and the path in Cargo.toml is repo-relative.
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          set -eux
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "${GITHUB_WORKSPACE}/debug.keystore"
          else
            echo "WARNING: ANDROID_DEBUG_KEYSTORE_B64 secret not set — generating throwaway keystore."
            echo "APKs from this run cannot upgrade APKs signed by a different run."
            keytool -genkeypair -v \
              -keystore "${GITHUB_WORKSPACE}/debug.keystore" \
              -storetype PKCS12 \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build APK (release)
        run: cargo apk build -p soul-runner-android --release

      - name: Locate APK
        id: apk
        run: |
          apk_path="$(find target -path '*release/apk/*.apk' | head -n1)"
          if [ -z "$apk_path" ]; then
            echo "no APK produced under target/" >&2
            find target -name '*.apk' || true
            exit 1
          fi
          echo "Found APK at $apk_path"
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "name=soulos-${GITHUB_SHA::7}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Attach APK to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
