name: Preview Screenshots

on:
  pull_request:
    types: [labeled]

jobs:
  screenshots:
    if: github.event.label.name == 'preview'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Detect changed apps
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          APPS=""
          while IFS= read -r f; do
            case "$f" in
              crates/soul-runner/src/launcher.rs)  APPS="$APPS,launcher" ;;
              crates/soul-runner/src/draw.rs)      APPS="$APPS,draw" ;;
              crates/soul-runner/src/paint.rs)     APPS="$APPS,paint" ;;
              crates/soul-runner/src/builder.rs)   APPS="$APPS,builder" ;;
              crates/soul-runner/src/egui_demo.rs) APPS="$APPS,egui_demo" ;;
            esac
          done <<< "$CHANGED"

          # Deduplicate and strip leading comma
          APPS=$(echo "$APPS" | tr ',' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')

          # Fall back to all apps when no specific file changed
          if [ -z "$APPS" ]; then
            APPS="launcher,draw,paint,builder,egui_demo"
          fi

          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "Screenshotting: $APPS"

      - name: Install Linux display dependencies
        run: sudo apt-get install -y libxkbcommon-dev

      - name: Run screenshot tests
        env:
          SCREENSHOT_APPS: ${{ steps.changed.outputs.apps }}
          SCREENSHOT_OUT: ${{ github.workspace }}/screenshots
          DISPLAY: ""
        run: |
          mkdir -p screenshots
          cargo test -p soul-runner screenshot -- --test-threads=1 --nocapture

      - name: Upload screenshots
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: preview-screenshots-pr${{ github.event.pull_request.number }}
          path: screenshots/*.png
          if-no-files-found: warn

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const apps = '${{ steps.changed.outputs.apps }}'.split(',').filter(Boolean);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;

            const rows = apps.map(a => `| \`${a}\` | [view](${artifactUrl}) |`).join('\n');
            const body = [
              '## Preview Screenshots',
              '',
              'Harness screenshots captured for changed apps:',
              '',
              '| App | Download |',
              '|-----|----------|',
              rows,
              '',
              `[View all artifacts](${artifactUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
