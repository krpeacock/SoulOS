<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SoulOS</title>
    <!-- Trunk's bundled wasm-opt rejects rustc's bulk-memory ops by
         default; pass --enable-bulk-memory so release builds succeed. -->
    <link data-trunk rel="rust"
          data-wasm-opt="z"
          data-wasm-opt-params="--enable-bulk-memory" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app {
            font-size: clamp(1.5rem, 6vw, 3rem);
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
